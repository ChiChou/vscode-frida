name: CI

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'types.d.ts'
      - 'tsconfig.json'
      - 'package.json'
      - 'package-lock.json'
      - 'agent/src/**'
      - 'agent/tsconfig.json'
      - 'agent/package.json'
      - 'agent/package-lock.json'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'types.d.ts'
      - 'tsconfig.json'
      - 'package.json'
      - 'package-lock.json'
      - 'agent/src/**'
      - 'agent/tsconfig.json'
      - 'agent/package.json'
      - 'agent/package-lock.json'
      - '.github/workflows/ci.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 24.x
        cache: npm
        cache-dependency-path: |
          package-lock.json
          agent/package-lock.json
    - name: Install dependencies
      run: npm ci
    - name: Build extension
      run: npm run compile
    - name: Build agent
      run: |
        cd agent
        npm ci
        npm run build
