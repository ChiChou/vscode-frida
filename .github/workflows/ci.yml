name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 24.x
        cache: npm
        cache-dependency-path: |
          package-lock.json
          agent/package-lock.json
    - name: Install dependencies
      run: npm ci
    - name: Build extension
      run: npm run compile
    - name: Build agent
      run: |
        cd agent
        npm ci
        npm run build
